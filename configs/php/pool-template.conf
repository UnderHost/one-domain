; =============================================================================
; UnderHost PHP-FPM Pool Reference Template
;
; Copy to:
;   Ubuntu/Debian : /etc/php/<VERSION>/fpm/pool.d/<domain>.conf
;   AlmaLinux     : /etc/php-fpm.d/<domain>.conf
;
; Replace DOMAIN, SITE_USER, WEB_USER, SOCKET_PATH with your values.
; =============================================================================

[DOMAIN]
; ─── Identity ────────────────────────────────────────────────────────────────
; Run PHP workers as a dedicated, locked system user per domain.
; Never run multiple domains under the same user.
user  = SITE_USER
group = SITE_USER

; ─── Socket ──────────────────────────────────────────────────────────────────
; Unix socket is faster than TCP for local Nginx→PHP-FPM communication.
; Socket ownership must match the Nginx process user (www-data or nginx).
listen       = SOCKET_PATH
listen.owner = WEB_USER
listen.group = WEB_USER
listen.mode  = 0660

; ─── Process Manager ─────────────────────────────────────────────────────────
; pm = dynamic  : Recommended for most sites. Scales between min/max.
; pm = ondemand : Good for low-traffic or many idle domains. Slower cold start.
; pm = static   : Fixed worker count. Use only for high-traffic, well-profiled sites.
pm = dynamic

; Max concurrent PHP processes for this pool.
; Rule of thumb: available_RAM_MB / ~40MB_per_worker
; For 1 GB RAM:  25   |  2 GB: 50  |  4 GB: 100
pm.max_children      = 25

; Workers started on pool start.
; Rule of thumb: cpu_cores (min 2)
pm.start_servers     = 2

; Minimum idle workers kept alive.
pm.min_spare_servers = 2

; Maximum idle workers before excess are killed.
pm.max_spare_servers = 4

; Restart a worker after this many requests to prevent memory leaks.
; 0 = never restart (not recommended for long-running sites).
pm.max_requests = 500

; ─── Timeouts ────────────────────────────────────────────────────────────────
; Kill a worker if the request takes longer than this (seconds).
; Increase for long-running scripts (imports, cron, etc.)
request_terminate_timeout = 300

; Slowlog threshold — log requests slower than N seconds.
; Set to 0 to disable. Log file must be writable by pool user.
; request_slowlog_timeout = 5
; slowlog = /var/log/php-fpm/DOMAIN.slow.log

; ─── Security ────────────────────────────────────────────────────────────────
; Only execute .php files — prevents executing .php.jpg, etc.
security.limit_extensions = .php

; Prevent information disclosure
php_flag[display_errors]  = off
php_flag[log_errors]      = on

; ─── Logging ─────────────────────────────────────────────────────────────────
access.log  = /var/log/php-fpm/DOMAIN.access.log

; Error log — separate from global PHP log for per-domain isolation
php_value[error_log] = /var/log/php-fpm/DOMAIN.error.log

; ─── Sessions ────────────────────────────────────────────────────────────────
; Isolated session directory per domain — prevents session cross-contamination.
; Create this directory: mkdir -p /var/lib/php/sessions/DOMAIN
; Set ownership: chown SITE_USER:SITE_USER /var/lib/php/sessions/DOMAIN
php_value[session.save_path] = /var/lib/php/sessions/DOMAIN

; ─── Environment ─────────────────────────────────────────────────────────────
; Expose only minimal environment variables to PHP workers.
env[HOSTNAME]  = $HOSTNAME
env[PATH]      = /usr/local/bin:/usr/bin:/bin
env[TMP]       = /tmp
env[TMPDIR]    = /tmp
env[TEMP]      = /tmp

; ─── Tuning Cheatsheet ───────────────────────────────────────────────────────
; RAM    | max_children | start | min_spare | max_spare
; 512 MB |      12      |   2   |     2     |     4
; 1 GB   |      25      |   2   |     2     |     6
; 2 GB   |      50      |   4   |     3     |     8
; 4 GB   |     100      |   6   |     4     |    12
; 8 GB   |     200      |   8   |     6     |    16
;
; Monitor pool status:  curl http://127.0.0.1/fpm-status?full
; (Requires pm.status_path = /fpm-status in this config +
;  a matching Nginx location restricted to 127.0.0.1)
