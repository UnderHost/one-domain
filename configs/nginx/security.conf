# =============================================================================
# UnderHost — Nginx global security hardening snippet
#
# Include in http {} block or place in /etc/nginx/conf.d/
# =============================================================================

# Hide Nginx version in headers and error pages
server_tokens off;

# Limit request methods globally (override per-location if needed)
# Only GET, HEAD, POST allowed at server level
# Note: PUT, DELETE, PATCH need to be allowed in specific API locations

# Limit request body size — prevents large upload abuse (adjust per site)
client_max_body_size 64m;

# Timeouts — prevent slow-loris style attacks
client_body_timeout   30;
client_header_timeout 30;
send_timeout          60;
keepalive_timeout     65;

reset_timedout_connection on;

# Buffer limits — prevent buffer overflow attacks
client_body_buffer_size    128k;
client_header_buffer_size  1k;
large_client_header_buffers 4 8k;

# =============================================================================
# Security headers applied globally (can be overridden per-server block)
# =============================================================================

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy — disable sensitive browser features by default
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# =============================================================================
# Rate limiting zones (reference in server/location blocks)
# =============================================================================

# General request limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# Login page — aggressive limiting
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

# API endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# =============================================================================
# Map: block common bad bots and scanners
# =============================================================================
map $http_user_agent $bad_bot {
    default           0;
    ~*masscan         1;
    ~*nikto           1;
    ~*sqlmap          1;
    ~*nmap            1;
    ~*zgrab           1;
    ~*nuclei          1;
    ~*python-requests 0;   # Legitimate; keep 0 unless you see abuse
    ""                1;   # Block empty User-Agent
}
