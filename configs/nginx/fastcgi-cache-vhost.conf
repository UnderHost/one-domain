# =============================================================================
# UnderHost — Nginx FastCGI Cache per-vhost snippet
#
# Copy this snippet inside the server {} block of your site's vhost.
# Requires fastcgi-cache-global.conf to be loaded in the http {} context.
#
# This config is WordPress-aware:
#   - Bypasses cache for logged-in users
#   - Bypasses cache for POST requests and query strings
#   - Bypasses cache for WooCommerce cart/checkout pages
#   - Purge via: curl -X PURGE http://domain.com/path
# =============================================================================

    # --- Cache bypass conditions ---
    set $skip_cache 0;

    # Bypass on POST requests
    if ($request_method = POST)        { set $skip_cache 1; }

    # Bypass when query string is present (search, pagination with params, etc.)
    if ($query_string != "")           { set $skip_cache 1; }

    # Bypass for WordPress admin and login pages
    if ($request_uri ~* "^/wp-admin")  { set $skip_cache 1; }
    if ($request_uri ~* "wp-login\.php") { set $skip_cache 1; }

    # Bypass for WooCommerce dynamic pages
    if ($request_uri ~* "/cart|/checkout|/my-account|/addons") {
        set $skip_cache 1;
    }

    # Bypass for logged-in users (WordPress sets these cookies)
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
        set $skip_cache 1;
    }

    # --- Apply to PHP location block ---
    # Add these directives inside your `location ~ \.php$` block:
    #
    #   fastcgi_cache            FASTCGI;
    #   fastcgi_cache_valid      200 301 302 1h;
    #   fastcgi_cache_bypass     $skip_cache;
    #   fastcgi_no_cache         $skip_cache;
    #   fastcgi_cache_min_uses   1;

    # --- Purge endpoint (optional — useful with nginx-cache-purge module) ---
    # location ~ /purge(/.*) {
    #     allow 127.0.0.1;
    #     deny all;
    #     fastcgi_cache_purge FASTCGI "$scheme$request_method$host$1";
    # }
