# =============================================================================
# UnderHost — Nginx FastCGI Cache global configuration
#
# Include this in the http {} block of /etc/nginx/nginx.conf
# (or drop into /etc/nginx/conf.d/ — it will be auto-included)
#
# Usage:
#   Add to /etc/nginx/nginx.conf inside http {}:
#     include /etc/nginx/conf.d/uh-fastcgi-cache.conf;
#
#   Then enable per-vhost by adding the vhost snippet.
# =============================================================================

# Cache zone definition
# - keys_zone: name:size of shared memory for keys (100m ≈ 800k entries)
# - levels: directory nesting (1:2 is standard)
# - inactive: purge entries not accessed within this time
# - max_size: total disk space for cached objects
fastcgi_cache_path /var/cache/nginx/fastcgi
    levels=1:2
    keys_zone=FASTCGI:100m
    inactive=60m
    max_size=2g
    use_temp_path=off;

# Global cache key — uniquely identifies a cacheable response
fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Pass cache status header for debugging (HIT / MISS / BYPASS / EXPIRED)
add_header X-FastCGI-Cache $upstream_cache_status;

# Cache lock — prevents cache stampede on cold/expired entries
fastcgi_cache_lock            on;
fastcgi_cache_lock_timeout    5s;

# Background update — serve stale while revalidating
fastcgi_cache_background_update on;
fastcgi_cache_use_stale error timeout updating http_500 http_503;
