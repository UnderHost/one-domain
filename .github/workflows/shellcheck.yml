name: ShellCheck

on:
  push:
    branches: [ main, release/2026.4.0 ]
  pull_request:
    branches: [ main, release/2026.4.0 ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error  # Only fail on errors, not warnings